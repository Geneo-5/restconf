name: Docker Image CI

on:
  push:
    branches: [ "h2c" ]
  pull_request:
    branches: [ "h2c" ]

permissions:
  contents: read

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file docker/Dockerfile --tag restconfd:$(date +%s)